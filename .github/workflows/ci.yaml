name: "build-test"

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

concurrency:
  cancel-in-progress: true
  group: "${{ github.workflow }}-${{ github.ref }}"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: pnpm/action-setup@v6.0.9
      - name: Setup node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "22"
          cache: pnpm

      - run: pnpm i

      - run: pnpm run format:check
      - run: pnpm run lint
      - run: pnpm run build

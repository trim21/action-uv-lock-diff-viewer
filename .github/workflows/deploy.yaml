name: deploy

on:
  push:
    tags:
      - "v*"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      NODE_VERSION: "22"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - name: Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm i

      - run: pnpm run build

      - run: |
          mkdir dist/dist
          mv dist/index.js dist/dist/index.js
          cp action.yml dist

      - run: echo "TAG=v$(cat package.json | jq .version -r)" >> $GITHUB_ENV

      - name: Generate Changelog
        id: changelog
        uses: requarks/changelog-action@b78a3354a01f4a1affb484b9264b506a815c46b1 # v1.10.3
        with:
          token: ${{ github.token }}
          tag: ${{ github.ref_name }}
          writeToFile: false
          restrictToTypes: feat,fix,revert

      - name: Deploy
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          commit_message: deploy ${{ github.ref }}
          publish_branch: dist/v0
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
          tag_name: dist/${{ env.TAG }}
          tag_message: "release ${{ github.ref_name }}"

      - run: gh release create "dist/${TAG}" --notes "${CHANGELOG}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHANGELOG: "${{ steps.changelog.outputs.changes }}"
